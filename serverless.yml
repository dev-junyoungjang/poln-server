service: tcg-api

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-northeast-2
  memorySize: 256
  timeout: 10
  websocketsApiName: full-league-ws
  websocketsApiRouteSelectionExpression: $request.body.action
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
          Resource:
            - arn:aws:dynamodb:ap-northeast-2:*:table/full-league-table
            - arn:aws:dynamodb:ap-northeast-2:*:table/league-connections
            - arn:aws:dynamodb:ap-northeast-2:*:table/tournament-players
            - arn:aws:dynamodb:ap-northeast-2:*:table/selected-tournament
        - Effect: Allow
          Action:
            - execute-api:ManageConnections
          Resource:
            - arn:aws:execute-api:ap-northeast-2:*:*/*
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - arn:aws:s3:::plon-image/seat-image/*
            - arn:aws:s3:::plon-image/seat-image-converted/*
        - Effect: Allow
          Action:
            - s3:ListBucket
          Resource:
            - arn:aws:s3:::plon-image
  environment:
    LEAGUES_TABLE: full-league-table
    CONNECTIONS_TABLE: league-connections
    TOURNAMENT_TABLE: tournament-players
    SELECTED_TOURNAMENT_TABLE: selected-tournament
    SEAT_IMAGES_BUCKET: plon-image
    ADMIN_KEY: ${env:ADMIN_KEY, ''}

plugins:
  - serverless-dotenv-plugin
  - serverless-esbuild
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    format: cjs
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002

functions:
  proxy:
    handler: src/handler.proxy
    events:
      - http:
          path: /api/proxy
          method: get
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false
      - http:
          path: /api/proxy
          method: options
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  createLeague:
    handler: src/league.createLeague
    events:
      - http:
          path: /api/league
          method: post
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false
      - http:
          path: /api/league
          method: options
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  getLeague:
    handler: src/league.getLeague
    events:
      - http:
          path: /api/league
          method: get
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  updateLeague:
    handler: src/league.updateLeague
    events:
      - http:
          path: /api/league
          method: put
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  # WebSocket handlers
  wsConnect:
    handler: src/websocket.connect
    events:
      - websocket:
          route: $connect

  wsDisconnect:
    handler: src/websocket.disconnect
    events:
      - websocket:
          route: $disconnect

  wsJoinLeague:
    handler: src/websocket.joinLeague
    events:
      - websocket:
          route: joinLeague

  wsTimerUpdate:
    handler: src/websocket.timerUpdate
    events:
      - websocket:
          route: timerUpdate

  saveTournamentRound:
    handler: src/tournament.saveTournamentRound
    events:
      - http:
          path: /api/tournament
          method: post
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false
      - http:
          path: /api/tournament
          method: options
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  deleteTournamentRound:
    handler: src/tournament.deleteTournamentRound
    events:
      - http:
          path: /api/tournament
          method: delete
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  getTournamentRounds:
    handler: src/tournament.getTournamentRounds
    events:
      - http:
          path: /api/tournament/rounds
          method: get
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false
      - http:
          path: /api/tournament/rounds
          method: options
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  getTournamentWLD:
    handler: src/tournament.getTournamentWLD
    events:
      - http:
          path: /api/tournament/wld
          method: get
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false
      - http:
          path: /api/tournament/wld
          method: options
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  putSelectedTournament:
    handler: src/tournament.putSelectedTournament
    events:
      - http:
          path: /api/tournament/selected
          method: put
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  deleteSelectedTournament:
    handler: src/tournament.deleteSelectedTournament
    events:
      - http:
          path: /api/tournament/selected
          method: delete
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  getSelectedTournament:
    handler: src/tournament.getSelectedTournament
    events:
      - http:
          path: /api/tournament/selected
          method: get
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false
      - http:
          path: /api/tournament/selected
          method: options
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  getSeatImage:
    handler: src/seatImage.getSeatImage
    events:
      - http:
          path: /api/tournament/seat-image
          method: get
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false
      - http:
          path: /api/tournament/seat-image
          method: options
          cors:
            origin: '*'
            headers:
              - Content-Type
              - x-admin-key
            allowCredentials: false

  getSeatImageUploadUrl:
    handler: src/seatImage.getSeatImageUploadUrl
    events:
      - http:
          path: /api/tournament/seat-image/upload-url
          method: post
          cors:
            origin: '*'
            headers:
              - Content-Type
              - x-admin-key
            allowCredentials: false
      - http:
          path: /api/tournament/seat-image/upload-url
          method: options
          cors:
            origin: '*'
            headers:
              - Content-Type
              - x-admin-key
            allowCredentials: false

  deleteSeatImage:
    handler: src/seatImage.deleteSeatImage
    events:
      - http:
          path: /api/tournament/seat-image
          method: delete
          cors:
            origin: '*'
            headers:
              - Content-Type
              - x-admin-key
            allowCredentials: false
