service: tcg-api

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-northeast-2
  memorySize: 256
  timeout: 10
  websocketsApiName: full-league-ws
  websocketsApiRouteSelectionExpression: $request.body.action
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
          Resource:
            - arn:aws:dynamodb:ap-northeast-2:*:table/full-league-table
            - arn:aws:dynamodb:ap-northeast-2:*:table/league-connections
            - arn:aws:dynamodb:ap-northeast-2:*:table/tournament-players
            - arn:aws:dynamodb:ap-northeast-2:*:table/selected-tournament
        - Effect: Allow
          Action:
            - execute-api:ManageConnections
          Resource:
            - arn:aws:execute-api:ap-northeast-2:*:*/*
  logs:
    restApi:
      accessLogging: true
      executionLogging: false
      format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","method":"$context.httpMethod","path":"$context.resourcePath","status":"$context.status","responseLength":"$context.responseLength","latency":"$context.responseLatency","userAgent":"$context.identity.userAgent","time":"$context.requestTime"}'
  environment:
    LEAGUES_TABLE: full-league-table
    CONNECTIONS_TABLE: league-connections
    TOURNAMENT_TABLE: tournament-players
    SELECTED_TOURNAMENT_TABLE: selected-tournament

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    format: cjs
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002

functions:
  proxy:
    handler: src/handler.proxy
    events:
      - http:
          path: /api/proxy
          method: get
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false
      - http:
          path: /api/proxy
          method: options
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  createLeague:
    handler: src/league.createLeague
    events:
      - http:
          path: /api/league
          method: post
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false
      - http:
          path: /api/league
          method: options
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  getLeague:
    handler: src/league.getLeague
    events:
      - http:
          path: /api/league
          method: get
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  updateLeague:
    handler: src/league.updateLeague
    events:
      - http:
          path: /api/league
          method: put
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  # WebSocket handlers
  wsConnect:
    handler: src/websocket.connect
    events:
      - websocket:
          route: $connect

  wsDisconnect:
    handler: src/websocket.disconnect
    events:
      - websocket:
          route: $disconnect

  wsJoinLeague:
    handler: src/websocket.joinLeague
    events:
      - websocket:
          route: joinLeague

  wsTimerUpdate:
    handler: src/websocket.timerUpdate
    events:
      - websocket:
          route: timerUpdate

  saveTournamentRound:
    handler: src/tournament.saveTournamentRound
    events:
      - http:
          path: /api/tournament
          method: post
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false
      - http:
          path: /api/tournament
          method: options
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  getTournamentRounds:
    handler: src/tournament.getTournamentRounds
    events:
      - http:
          path: /api/tournament/rounds
          method: get
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false
      - http:
          path: /api/tournament/rounds
          method: options
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  getTournamentWLD:
    handler: src/tournament.getTournamentWLD
    events:
      - http:
          path: /api/tournament/wld
          method: get
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false
      - http:
          path: /api/tournament/wld
          method: options
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false

  getSelectedTournament:
    handler: src/tournament.getSelectedTournament
    events:
      - http:
          path: /api/tournament/selected
          method: get
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false
      - http:
          path: /api/tournament/selected
          method: options
          cors:
            origin: '*'
            headers:
              - Content-Type
            allowCredentials: false
